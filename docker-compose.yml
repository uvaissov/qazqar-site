services:
  postgres:
    image: postgres:16-alpine
    container_name: qazqar-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: qazqar
      POSTGRES_USER: qazqar
      POSTGRES_PASSWORD: qazqar_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qazqar"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: qazqar-minio
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: qazqar-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/qazqar-images --ignore-existing;
      mc anonymous set download local/qazqar-images;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
